services:
  # Single Python agentic backend (LangGraph + tools)
  - type: web
    name: solar-ai-ml
    runtime: python
    rootDir: ./ml-services
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    region: oregon
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: NREL_API_KEY
        sync: false
      - key: GROQ_VISION_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: OPENROUTER_VISION_MODEL
        value: google/gemma-3-27b-it:free
